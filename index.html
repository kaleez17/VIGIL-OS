<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VIGIL_SINGULARITY_v33_PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body id="vigil-root" data-theme="dark">

<div id="frost-overlay"></div>
<canvas id="neural-canvas"></canvas>
<canvas id="matrix-canvas"></canvas>

<div class="panel">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <div style="font-size: 10px; color: var(--money); border: 1px solid var(--money); padding: 5px 15px; border-radius: 20px;">VIGIL_SINGULARITY_v33 // PRECISOR</div>
        <button class="btn theme-btn" style="width: auto; padding: 5px 15px; margin: 0;" onclick="toggleTheme()">SWAP_THEME</button>
    </div>
    
    <div id="cpu-hero">0.0%</div>
    
    <div id="shell-output">SYSTEM_READY // INITIATE_REMOTE_CMD...</div>
    <div style="margin-top: 10px; display: flex; gap: 10px;">
        <input type="text" id="cmd-input" placeholder="POWER_SHELL_COMMAND">
        <button class="btn" style="width: 100px; margin: 0;" onclick="execute()">RUN</button>
    </div>

    <div class="stat-grid">
        <div class="card">
            <h4>CORE_TEMPERATURE</h4>
            <p id="temp-display" style="font-size: 2.5rem; margin:0; font-weight: bold; color: var(--money);">0.0°C</p>
        </div>
        <div class="card">
            <h4>THREAT_GEOLOCATION</h4>
            <p id="geo-info" style="font-size: 1rem; margin:0; color: var(--danger);">SCANNING...</p>
        </div>
    </div>
</div>

<div class="sidebar">
    <div class="card" style="border-color: var(--money);">
        <h4>8GB_RAM_COMMITMENT</h4>
        <p id="mem-val" style="font-size: 3rem; margin:0; color: var(--money); font-weight: bold;">0%</p>
    </div>
    
    <div style="margin: 20px 0;">
        <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px; color: var(--text);">MEMORY_FRAGMENTATION_MAP</div>
        <div class="frag-grid" id="frag-grid"></div>
    </div>

    <div style="margin-top: auto;">
        <div style="font-size: 9px; color: var(--danger); margin-bottom: 10px; text-align: center;">PROTECTION: 3-STRIKE_SELF_DESTRUCT_ACTIVE</div>
        <input type="password" id="pass" placeholder="MASTER_PASS_KUTTY">
        <button id="kill-btn" class="btn btn-kill" onclick="kill()">TERMINATE_SOVEREIGN</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
